name: Deploy Vibe Clip Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT || '22' }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/vibeclip_ali' }}
          ALIYUN_DEPLOY_BRANCH: ${{ secrets.ALIYUN_DEPLOY_BRANCH || 'main' }}
          ALIYUN_VITE_API_BASE_URL: ${{ secrets.ALIYUN_VITE_API_BASE_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${ALIYUN_ECS_HOST}" ] || [ -z "${ALIYUN_ECS_USER}" ] || [ -z "${ALIYUN_ECS_SSH_KEY}" ]; then
            echo "Missing required secrets: ALIYUN_ECS_HOST, ALIYUN_ECS_USER, ALIYUN_ECS_SSH_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${ALIYUN_ECS_SSH_KEY}" > ~/.ssh/aliyun_ecs_key
          chmod 600 ~/.ssh/aliyun_ecs_key

          ssh-keyscan -p "${ALIYUN_ECS_PORT}" "${ALIYUN_ECS_HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/aliyun_ecs_key \
            -p "${ALIYUN_ECS_PORT}" \
            "${ALIYUN_ECS_USER}@${ALIYUN_ECS_HOST}" \
            "APP_DIR='${ALIYUN_APP_DIR}' BRANCH='${ALIYUN_DEPLOY_BRANCH}' VITE_API_BASE_URL='${ALIYUN_VITE_API_BASE_URL}' bash -s" <<'REMOTE_DEPLOY'
          set -Eeuo pipefail

          if [ ! -d "${APP_DIR}/.git" ]; then
            echo "APP_DIR is not a git repository: ${APP_DIR}" >&2
            exit 1
          fi

          cd "${APP_DIR}"
          git fetch origin "${BRANCH}"
          git reset --hard "origin/${BRANCH}"

          bash "${APP_DIR}/deploy/aliyun/deploy-from-github.sh"
          REMOTE_DEPLOY
