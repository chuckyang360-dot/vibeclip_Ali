# 阿里云 ECS：Nginx 公网入口 + 后端容器（backend 不映射宿主机端口）。
#
# 使用方式（在 deploy/aliyun 目录下）：
#   1. 在仓库根 frontend/ 执行 npm ci && npm run build，生成 frontend/dist
#   2. cp .env.example .env 并按 README 填写（勿提交 .env）
#   3. docker compose up -d --build
#
# 路径说明：build.context 与 volumes 相对本文件所在目录（deploy/aliyun）。

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        APT_MIRROR: https://mirrors.aliyun.com/debian
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    restart: unless-stopped
