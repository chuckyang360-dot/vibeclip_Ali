# 模式 A（推荐）：www = 静态前端，api = 反代 FastAPI。
# 证书：将下面 HTTPS server 块取消注释并挂载证书目录后再启用 443。

upstream vibe_backend {
    server backend:8000;
    keepalive 32;
}

# ---------- 前端：www.vibeclip.cn（HTTP） ----------
server {
    listen 80;
    listen [::]:80;
    server_name www.vibeclip.cn;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 模式 B 可参考 README：同域 /api 由前端域反代时在此增加 location /api/
}

# ---------- API：api.vibeclip.cn（HTTP） ----------
server {
    listen 80;
    listen [::]:80;
    server_name api.vibeclip.cn;

    client_max_body_size 500m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    # 健康检查（也可通过完整 API 路径验收）
    location = /health {
        proxy_pass http://vibe_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://vibe_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

